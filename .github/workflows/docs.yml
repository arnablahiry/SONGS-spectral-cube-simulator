name: Deploy API Docs

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx-book-theme myst-parser
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: Build Sphinx docs
        run: sphinx-build docs/source docs/build

      - name: Checkout Pages repo
        uses: actions/checkout@v4
        with:
          repository: arnablahiry/arnablahiry.github.io
          token: ${{ secrets.DOCS_PAGES }}
          path: pages_repo

      - name: Sync built site to Pages repo
        run: |
          mkdir -p pages_repo/software/songs
          rsync -av --delete docs/build/ pages_repo/software/songs/
          cd pages_repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add software/songs
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Auto-deploy SONGS docs from ${{ github.sha }}"
            git push origin main
          fi
